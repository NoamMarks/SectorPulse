name: SectorPulse Daily

# Schedule in UTC (GitHub cron is UTC-only and does NOT follow DST — PRD §8.1).
# 22:30 UTC is comfortably after the 16:00 ET close in BOTH EST (17:30 ET) and
# EDT (18:30 ET). Correctness does not depend on firing time: the job resolves
# the latest completed trading date in code and is idempotent (PRD §8.3).
on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore the idempotency guard and recompute"
        type: boolean
        default: false

concurrency:
  group: sectorpulse-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # to push the data branch (PRD §8.5 least-privilege)
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Seed ./data with the prior snapshot + history cache so the settled EOD run
      # can overlay today's IEX close, grow history, and apply breadth hysteresis.
      - name: Restore previous data + history cache from the data branch
        run: |
          mkdir -p data
          if git fetch -q origin data 2>/dev/null; then
            git show origin/data:latest.json > data/latest.json 2>/dev/null || true
            git show origin/data:eod_cache.json.gz > data/eod_cache.json.gz 2>/dev/null || echo "no cache yet (seed it locally — see README)"
          fi

      - name: Run settled EOD (Tiingo IEX overlaid on cached history)
        id: run
        env:
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m pipeline.main --mode eod --no-web ${{ inputs.force && '--force' || '' }}
          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: Publish to the data branch (durable history, PRD §9)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/publish_data_branch.sh

      - name: Upload data artifact for the deploy job
        uses: actions/upload-artifact@v4
        with:
          name: sectorpulse-data
          path: data/latest.json

  deploy:
    needs: compute
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sectorpulse-data
          path: web/public/data

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web
      # Point the deployed site at the LIVE data-branch file so intraday updates
      # reach users without rebuilding the site (the app runtime-fetches + polls it).
      - run: npm run build
        working-directory: web
        env:
          VITE_DATA_URL: https://raw.githubusercontent.com/${{ github.repository }}/data/latest.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - id: pages
        uses: actions/deploy-pages@v4
